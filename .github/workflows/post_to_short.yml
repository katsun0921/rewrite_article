name: WP Post → ショート動画 (PoC)

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: "対象の公開 Post ID"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (FFmpeg + 日本語フォント)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate short video
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
        run: |
          python scripts/post_to_short.py \
            --post-id "${{ inputs.post_id }}" \
            --output "short_${{ inputs.post_id }}.mp4"

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: short-video-${{ inputs.post_id }}
          path: short_${{ inputs.post_id }}.mp4
          retention-days: 14
