name: Google Doc → WP 書き戻し

# Phase 3 未実装 - ワークフローのスタブ
# 実装後にコメントを外して有効化する

on:
  workflow_dispatch:
    inputs:
      doc_id:
        description: "Google Doc の ID（URLの /d/ここ/）"
        required: true
        type: string
      post_id:
        description: "書き戻し先の WP Post ID"
        required: true
        type: string
      dry_run:
        description: "true にすると WP への書き込みをスキップ（確認用）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Phase 3 未実装
        run: |
          echo "::error::Phase 3 は未実装です。docs/features/spec.md を参照してください。"
          exit 1

